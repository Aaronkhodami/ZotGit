name: Tag Release XPI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-tag-release:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate script definitions
        shell: pwsh
        run: python .\script_definition_builder.py

      - name: Read versions
        id: version
        shell: pwsh
        run: |
          $manifest = Get-Content -Path .\manifest.json -Raw | ConvertFrom-Json
          $manifestVersion = [string]$manifest.version
          $tag = "${{ github.ref_name }}"
          $tagVersion = $tag.TrimStart('v')

          "manifest_version=$manifestVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "tag_version=$tagVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Ensure tag version matches manifest
        shell: pwsh
        run: |
          if ("${{ steps.version.outputs.tag_version }}" -ne "${{ steps.version.outputs.manifest_version }}") {
            throw "Tag version (${{ steps.version.outputs.tag_version }}) does not match manifest version (${{ steps.version.outputs.manifest_version }})"
          }

      - name: Build XPI package
        id: package
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.manifest_version }}"
          $xpiName = "zotgit-$version-fx.xpi"
          $buildItems = @(
            'bootstrap.js',
            'locale',
            'manifest.json',
            'prefs.js',
            'chrome',
            'preferences',
            'src',
            'lib',
            'init'
          )

          if (Test-Path $xpiName) {
            Remove-Item $xpiName -Force
          }

          Compress-Archive -Path $buildItems -DestinationPath $xpiName -CompressionLevel Optimal -Force

          "xpi_name=$xpiName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: zotgit-xpi-${{ steps.version.outputs.manifest_version }}
          path: ${{ steps.package.outputs.xpi_name }}

      - name: Create GitHub Release for tag
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.version.outputs.tag }}
          name: ZotGit ${{ steps.version.outputs.tag }}
          body: |
            Release for ${{ steps.version.outputs.tag }}.
            Built from commit ${{ github.sha }}.
          allowUpdates: true
          replacesArtifacts: true
          prerelease: false
          artifacts: ${{ steps.package.outputs.xpi_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
